<!-- Claude Usage — Full view -->

<div class="view view--full">

  <div class="layout layout--col gap--large lg:gap--xxlarge">

    <div class="progress-bar lg:progress-bar--large stretch-x">
      <div class="content">
        <span class="label lg:label--xlarge">Session</span>
        <span class="value value--xxsmall lg:value--small">{{ session_pct }}%</span>
      </div>
      <div class="track">
        <div class="fill" style="width:{{ session_pct }}%"></div>
      </div>
      <span class="description lg:description--large">Resets {{ session_reset }}</span>
    </div>

    <div class="progress-bar lg:progress-bar--large stretch-x">
      <div class="content">
        <span class="label lg:label--xlarge">Week · All Models</span>
        <span class="value value--xxsmall lg:value--small">{{ week_all_pct }}%</span>
      </div>
      <div class="track">
        <div class="fill" style="width:{{ week_all_pct }}%"></div>
      </div>
      <span class="description lg:description--large">Resets {{ week_all_reset }}</span>
    </div>

    <div class="progress-bar lg:progress-bar--large stretch-x">
      <div class="content">
        <span class="label lg:label--xlarge">Week · Sonnet</span>
        <span class="value value--xxsmall lg:value--small">{{ week_sonnet_pct }}%</span>
      </div>
      <div class="track">
        <div class="fill" style="width:{{ week_sonnet_pct }}%"></div>
      </div>
      <span class="description lg:description--large">Resets {{ week_sonnet_reset }}</span>
    </div>

  </div>
</div>

  <div class="title_bar">
    <span class="title">Claude Usage</span>
    <span class="instance">Updated {{ updated_at }}</span>
  </div>
