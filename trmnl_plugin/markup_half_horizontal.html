<!-- Claude Usage — Half Horizontal view -->

<div class="view view--half_horizontal">

  <div class="layout layout--col gap--medium lg:gap--large">

    <div class="progress-bar progress-bar--small lg:progress-bar--base stretch-x">
      <div class="content">
        <span class="label label--small lg:label--base">Session</span>
        <span class="value value--xxsmall lg:value--xsmall">{{ session_pct }}%</span>
      </div>
      <div class="track">
        <div class="fill" style="width:{{ session_pct }}%"></div>
      </div>
      <span class="description lg:description--large">Resets {{ session_reset_short }}</span>
    </div>

    <div class="progress-bar progress-bar--small lg:progress-bar--base stretch-x">
      <div class="content">
        <span class="label label--small lg:label--base">Week · All Models</span>
        <span class="value value--xxsmall lg:value--xsmall">{{ week_all_pct }}%</span>
      </div>
      <div class="track">
        <div class="fill" style="width:{{ week_all_pct }}%"></div>
      </div>
      <span class="description lg:description--large">Resets {{ week_all_reset_short }}</span>
    </div>

    <div class="progress-bar progress-bar--small lg:progress-bar--base stretch-x">
      <div class="content">
        <span class="label label--small lg:label--base">Week · Sonnet</span>
        <span class="value value--xxsmall lg:value--xsmall">{{ week_sonnet_pct }}%</span>
      </div>
      <div class="track">
        <div class="fill" style="width:{{ week_sonnet_pct }}%"></div>
      </div>
      <span class="description lg:description--large">Resets {{ week_sonnet_reset_short }}</span>
    </div>

  </div>
</div>

<div class="title_bar">
  <span class="title">Claude Usage</span>
  <span class="instance">{{ updated_at }}</span>
</div>
