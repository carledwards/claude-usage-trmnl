<!--
  TRMNL Private Plugin Markup — Claude Usage
  Monospace / left-justified / terminal-style + pixel robot
-->

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .wrap {
    padding: 18px 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex: 1;
  }

  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 2px solid #000;
    padding-bottom: 10px;
  }

  .title {
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1;
  }

  .metric {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .metric-top {
    display: flex;
    align-items: baseline;
  }

  .metric-label {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    flex: 1;
  }

  .metric-pct {
    font-size: 24px;
    font-weight: bold;
    line-height: 1;
    white-space: nowrap;
  }

  .bar-track {
    width: 100%;
    height: 16px;
    border: 2px solid #000;
    border-radius: 2px;
    overflow: hidden;
    background: #fff;
  }

  .bar-fill {
    height: 100%;
    background: #000;
  }

  .metric-reset {
    font-size: 14px;
    color: #222;
  }

  .robot {
    font-size: 15px;
    line-height: 1.0;
    white-space: pre;
  }

  .footer {
    font-size: 12px;
    color: #666;
    letter-spacing: 0.04em;
  }
</style>

<div class="wrap">

  <div class="header">
    <div class="title">Claude Usage</div>
    <pre class="robot"> ▐▛███▜▌
▝▜█████▛▘
  ▘▘ ▝▝</pre>
  </div>

  <div class="metric">
    <div class="metric-top">
      <span class="metric-label">Session</span>
      <span class="metric-pct">{{ session_pct }}%</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" style="width:{{ session_pct }}%"></div>
    </div>
    <div class="metric-reset">Resets {{ session_reset }}</div>
  </div>

  <div class="metric">
    <div class="metric-top">
      <span class="metric-label">Week &middot; All Models</span>
      <span class="metric-pct">{{ week_all_pct }}%</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" style="width:{{ week_all_pct }}%"></div>
    </div>
    <div class="metric-reset">Resets {{ week_all_reset }}</div>
  </div>

  <div class="metric">
    <div class="metric-top">
      <span class="metric-label">Week &middot; Sonnet</span>
      <span class="metric-pct">{{ week_sonnet_pct }}%</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" style="width:{{ week_sonnet_pct }}%"></div>
    </div>
    <div class="metric-reset">Resets {{ week_sonnet_reset }}</div>
  </div>

  <div class="footer">Updated {{ updated_at }}</div>

</div>
